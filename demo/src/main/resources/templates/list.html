<!-- templates/board/list.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>게시판 목록</title>
</head>
<body>
<h1>📋 게시글 목록</h1>

<a href="/board/post">✏️ 새 글 작성</a>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>제목</th>
        <th>내용</th>
        <th>수정</th>
        <th>삭제</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="board : ${boardList}">
        <td th:text="${board.id}"></td>
        <td th:text="${board.title}"></td>
        <td th:text="${board.content}"></td>
        <td><a th:href="@{'/board/update/' + ${board.id}}">✏️ 수정</a></td>
        <td><a th:href="@{'/board/delete/' + ${board.id}}">🗑 삭제</a></td>
    </tr>
    </tbody>
</table>
</body>
</html>
